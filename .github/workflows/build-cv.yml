name: Build and Release CV PDFs

on:
  workflow_dispatch:
  push:
    paths:
      - '**/*.tex'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Find latest FR and EN .tex files
        id: find
        run: |
          LATEST_FR=$(find . -name 'fr.tex' | sort -V | tail -1)
          LATEST_EN=$(find . -name 'en.tex' | sort -V | tail -1)

          echo "fr_tex=$LATEST_FR" >> "$GITHUB_OUTPUT"
          echo "en_tex=$LATEST_EN" >> "$GITHUB_OUTPUT"

          FR_VERSION=$(echo "$LATEST_FR" | grep -oP '\d{4}/\d{2}')
          EN_VERSION=$(echo "$LATEST_EN" | grep -oP '\d{4}/\d{2}')
          echo "fr_version=$FR_VERSION" >> "$GITHUB_OUTPUT"
          echo "en_version=$EN_VERSION" >> "$GITHUB_OUTPUT"

          echo "fr_dir=$(dirname $LATEST_FR)" >> "$GITHUB_OUTPUT"
          echo "en_dir=$(dirname $LATEST_EN)" >> "$GITHUB_OUTPUT"

      - name: Compile FR CV to PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: fr.tex
          working_directory: ${{ steps.find.outputs.fr_dir }}

      - name: Compile EN CV to PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: en.tex
          working_directory: ${{ steps.find.outputs.en_dir }}

      - name: Prepare release assets
        run: |
          cp "${{ steps.find.outputs.fr_dir }}/fr.pdf" "COTINEAU_Yann_CV_fr.pdf"
          cp "${{ steps.find.outputs.en_dir }}/en.pdf" "COTINEAU_Yann_CV_en.pdf"

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest CV"
          body: |
            Auto-generated CV PDFs from the latest `.tex` sources.

            - **FR**: `${{ steps.find.outputs.fr_version }}`
            - **EN**: `${{ steps.find.outputs.en_version }}`

            Updated on ${{ github.event.head_commit.timestamp }}
          make_latest: true
          files: |
            COTINEAU_Yann_CV_fr.pdf
            COTINEAU_Yann_CV_en.pdf
